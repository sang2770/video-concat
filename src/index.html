<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Concatenation Tool</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🎬 Video Concatenation Tool</h1>
      <p class="subtitle">Công cụ ghép video chuyên nghiệp · Job Queue · Worker Thread</p>
    </header>

    <!-- System Info Banner -->
    <div id="sysInfoBanner" class="sys-info-banner">
      <div class="sys-info-item" id="sysInfoCpu">
        <span class="sys-info-icon">🖥️</span>
        <span id="sysInfoCpuText">Đang kiểm tra CPU...</span>
      </div>
      <div class="sys-info-item" id="sysInfoGpu">
        <span class="sys-info-icon">🎮</span>
        <span id="sysInfoGpuText">Đang kiểm tra GPU...</span>
      </div>
      <div class="sys-info-item">
        <span class="sys-info-icon">🧵</span>
        <span id="sysInfoThreadText">—</span>
      </div>
    </div>

    <div class="main-content">
      <!-- Card 1: Video -->
      <div class="card">
        <div class="card-title">📁 Video & Cấu hình</div>

        <div class="form-group">
          <label>Thư mục video:</label>
          <div class="folder-selector">
            <button class="btn-primary" id="selectVideoFolder">Chọn</button>
            <div class="folder-path" id="videoFolderPath">Chưa chọn</div>
          </div>
          <div class="file-list" id="videoFileList"></div>
        </div>

        <div class="form-group">
          <label>Định dạng output:</label>
          <select id="videoFormat">
            <option value="mp4">MP4 (H.264)</option>
            <option value="avi">AVI</option>
            <option value="mkv">MKV</option>
            <option value="mov">MOV</option>
          </select>
        </div>

        <div class="form-group">
          <label>Bitrate video (Mbps):</label>
          <input type="number" id="videoBitrate" min="1" max="50" value="5">
        </div>

        <div class="form-group">
          <label>Số luồng encode: <span id="threadCountLabel" class="label-hint"></span></label>
          <input type="number" id="threadCount" min="1" max="16" value="2">
        </div>

        <div class="form-group">
          <label class="toggle-label">
            <span>Dùng GPU để encode</span>
            <span id="gpuEncoderBadge" class="gpu-badge gpu-none">Không có GPU</span>
            <label class="toggle-switch">
              <input type="checkbox" id="useGpuToggle" disabled>
              <span class="toggle-slider"></span>
            </label>
          </label>
          <div id="gpuHint" class="gpu-hint"></div>
        </div>
      </div>

      <!-- Card 2: Audio + Output -->
      <div class="card">
        <div class="card-title">🎵 Audio & Output</div>

        <div class="form-group">
          <label>Thư mục nhạc:</label>
          <div class="folder-selector">
            <button class="btn-primary" id="selectAudioFolder">Chọn</button>
            <div class="folder-path" id="audioFolderPath">Chưa chọn</div>
          </div>
          <div class="file-list" id="audioFileList"></div>
        </div>

        <div class="form-group">
          <label>Số bài hát random:</label>
          <input type="number" id="audioCount" min="1" max="100" value="5">
        </div>

        <div class="form-group">
          <label>Thời lượng video output (hh:mm:ss):</label>
          <div class="duration-input">
            <input type="number" id="targetHH" min="0" max="23" value="0"  placeholder="hh">
            <span class="duration-sep">:</span>
            <input type="number" id="targetMM" min="0" max="59" value="20" placeholder="mm">
            <span class="duration-sep">:</span>
            <input type="number" id="targetSS" min="0" max="59" value="59" placeholder="ss">
          </div>
          <div id="targetHint" class="target-hint">⏱️ 00:20:59 = 1259 giây</div>
        </div>

        <div class="form-group">
          <label>Thư mục lưu kết quả:</label>
          <div class="folder-selector">
            <button class="btn-primary" id="selectOutputFolder">Chọn</button>
            <div class="folder-path" id="outputFolderPath">Chưa chọn</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Status -->
    <div id="statusMessage"></div>

    <!-- Action buttons -->
    <div class="action-buttons" id="actionButtons">
      <button class="btn-primary"   id="addJobBtn">➕ Thêm vào hàng đợi</button>
      <button class="btn-danger"    id="cancelAllBtn">⛔ Huỷ tất cả</button>
      <button class="btn-secondary" id="resetButton">🔄 Đặt lại form</button>
    </div>

    <!-- Job Queue -->
    <div id="emptyQueue" class="empty-queue">
      <p>Hàng đợi trống — thêm job để bắt đầu xử lý</p>
    </div>

    <div id="queueContainer" class="hidden">
      <div class="queue-header">
        <span class="queue-title">📋 Hàng đợi xử lý</span>
      </div>
      <div id="queueList"></div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
